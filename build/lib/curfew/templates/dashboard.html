<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curfew 系统 - 仪表盘</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>🔐 Curfew 系统</h1>
            <nav class="nav">
                <a href="/" class="active">仪表盘</a>
                <a href="/schedule">时段管理</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="grid">
            <div class="card">
                <h2>📊 系统状态</h2>
                <div id="current-time" class="time-display">--:--:--</div>
                <p style="text-align: center; color: var(--text-secondary);">
                    当前日期类型: <strong id="date-type">--</strong>
                </p>
                <div style="margin-top: 1.5rem;">
                    <p style="text-align: center; color: var(--text-secondary); margin-bottom: 0.5rem;">
                        ⏱️ 连续使用时间
                    </p>
                    <div style="text-align: center;">
                        <span id="consecutive-time" style="font-size: 1.5rem; font-weight: bold; color: var(--text-primary);">--:--:--</span>
                        <span style="color: var(--text-secondary); margin: 0 0.5rem;">/</span>
                        <span id="consecutive-limit" style="font-size: 1.25rem; color: var(--text-secondary);">-- 分钟</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>📅 今日限制时段预览</h2>
            <div id="time-bar-container"></div>
        </div>
    </div>

    <footer class="footer">
        <p>Curfew 系统 - 智能宵禁管理</p>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            startStatusUpdates();
        });
    </script>
</body>
</html>
